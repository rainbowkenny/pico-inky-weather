<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City of London Skyscraper Walk</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { width: 100%; height: 100vh; }
  .info-panel {
    position: absolute; top: 10px; left: 50px; z-index: 1000;
    background: rgba(255,255,255,0.95); padding: 14px 18px;
    border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.2);
    max-width: 300px; font-size: 13px;
  }
  .info-panel h2 { margin: 0 0 4px; font-size: 16px; }
  .info-panel .sub { color: #666; margin: 0 0 6px; font-size: 12px; }
  .info-panel .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
  .info-panel .legend span { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .info-panel .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .stop-icon {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; border: 2.5px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .stop-main { background: #e63946; color: #fff; width: 30px; height: 30px; }
  .stop-bonus { background: #457b9d; color: #fff; width: 26px; height: 26px; font-size: 11px; }
  .stop-food { background: #f4a261; color: #fff; width: 26px; height: 26px; font-size: 11px; }
</style>
</head>
<body>
<div class="info-panel">
  <h2>🏙️ City Skyscraper Walk</h2>
  <p class="sub">Tower Hill 出发 · ~2.5km · 1.5-2小时</p>
  <div class="legend">
    <span><span class="dot" style="background:#e63946"></span> 主要景点</span>
    <span><span class="dot" style="background:#457b9d"></span> 顺路打卡</span>
    <span><span class="dot" style="background:#f4a261"></span> 午餐推荐</span>
  </div>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const stops = [
  // Main route stops (red)
  { lat: 51.5098, lng: -0.0766, name: "Tower Hill Station", num: "1", type: "main",
    desc: "🚇 起点！Circle线到这里。出站后右转就能看到伦敦塔。", height: "起点" },
  { lat: 51.5081, lng: -0.0759, name: "Tower of London", num: "2", type: "main",
    desc: "拍个照就好，不用买票进去。城墙外就很壮观。", height: "中世纪" },
  { lat: 51.5112, lng: -0.0833, name: "Sky Garden (Walkie Talkie)", num: "3", type: "main",
    desc: "20 Fenchurch Street — 顶楼Sky Garden免费！360°俯瞰全城。需提前预约 skygarden.london", height: "160m" },
  { lat: 51.5134, lng: -0.0824, name: "Leadenhall Building (Cheesegrater)", num: "4", type: "main",
    desc: "225m，像个巨型奶酪刨。斜面设计是为了不挡St Paul's Cathedral的视线。", height: "225m" },
  { lat: 51.5145, lng: -0.0803, name: "The Gherkin", num: "5", type: "main",
    desc: "30 St Mary Axe — 伦敦最有辨识度的摩天楼！广场上拍照角度最佳。", height: "180m" },
  { lat: 51.5155, lng: -0.0815, name: "22 Bishopsgate", num: "6", type: "main",
    desc: "278m — 伦敦最高办公楼。顶部有免费公共观景层和餐厅。", height: "278m" },
  { lat: 51.5138, lng: -0.0810, name: "The Scalpel", num: "7", type: "main",
    desc: "52 Lime Street — 像手术刀一样锋利的轮廓，2018年建成。", height: "190m" },
  { lat: 51.5128, lng: -0.0842, name: "Lloyd's Building", num: "8", type: "main",
    desc: "Richard Rogers设计 — 所有管道、电梯都在建筑外面！孩子们最喜欢这个。", height: "95m" },

  // Bonus stops (blue)
  { lat: 51.5130, lng: -0.0838, name: "Leadenhall Market", num: "B1", type: "bonus",
    desc: "维多利亚时代室内市场，Harry Potter对角巷取景地！就在Cheesegrater旁边。", height: "" },
  { lat: 51.5139, lng: -0.0984, name: "St Paul's Cathedral", num: "B2", type: "bonus",
    desc: "从Lloyd's Building走过去10分钟。Millennium Bridge就在对面。", height: "111m" },
  { lat: 51.5098, lng: -0.0764, name: "Tower Bridge", num: "B3", type: "bonus",
    desc: "从Tower Hill走2分钟到桥上，经典伦敦地标。可以走桥上玻璃步道(£12)。", height: "" },

  // Food stops (orange)
  { lat: 51.5056, lng: -0.0910, name: "Borough Market", num: "🍽️", type: "food",
    desc: "伦敦最有名的食品市场！各种street food，强烈推荐。从Lloyd's走15分钟。周日11:00-17:00营业。", height: "" },
  { lat: 51.5131, lng: -0.0836, name: "Leadenhall Market 餐厅", num: "🍽️", type: "food",
    desc: "市场里有好几家不错的餐厅和咖啡店，方便中途歇脚。", height: "" },
];

const map = L.map('map', { zoomControl: false }).setView([51.5120, -0.0820], 16);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19
}).addTo(map);

// Main walking route (red dashed)
const mainRoute = stops.filter(s => s.type === "main").map(s => [s.lat, s.lng]);
L.polyline(mainRoute, {
  color: '#e63946', weight: 4, opacity: 0.85,
  dashArray: '8, 6', lineCap: 'round'
}).addTo(map);

// Bonus detour lines (blue dotted)
// Leadenhall Market (from stop 4)
L.polyline([[51.5134, -0.0824], [51.5130, -0.0838]], {
  color: '#457b9d', weight: 2.5, opacity: 0.6, dashArray: '4, 6'
}).addTo(map);
// St Paul's (from stop 8)
L.polyline([[51.5128, -0.0842], [51.5139, -0.0984]], {
  color: '#457b9d', weight: 2.5, opacity: 0.6, dashArray: '4, 6'
}).addTo(map);
// Tower Bridge (from stop 2)
L.polyline([[51.5081, -0.0759], [51.5098, -0.0764]], {
  color: '#457b9d', weight: 2.5, opacity: 0.6, dashArray: '4, 6'
}).addTo(map);
// Borough Market (from Lloyd's)
L.polyline([[51.5128, -0.0842], [51.5056, -0.0910]], {
  color: '#f4a261', weight: 2.5, opacity: 0.5, dashArray: '4, 6'
}).addTo(map);

// Add markers
stops.forEach(stop => {
  let cls = 'stop-main';
  if (stop.type === 'bonus') cls = 'stop-bonus';
  if (stop.type === 'food') cls = 'stop-food';

  const icon = L.divIcon({
    className: '',
    html: `<div class="stop-icon ${cls}">${stop.num}</div>`,
    iconSize: [30, 30],
    iconAnchor: [15, 15]
  });

  const heightLine = stop.height ? `<div style="color:#888;font-size:11px;margin:2px 0">${stop.height}</div>` : '';

  L.marker([stop.lat, stop.lng], { icon })
    .addTo(map)
    .bindPopup(`
      <div style="font-family:sans-serif;max-width:240px">
        <strong style="font-size:14px">${stop.name}</strong>
        ${heightLine}
        <div style="font-size:12px;margin-top:4px;line-height:1.5">${stop.desc}</div>
      </div>
    `);
});

// Fit to main route
const allCoords = stops.filter(s => s.type === 'main').map(s => [s.lat, s.lng]);
map.fitBounds(allCoords, { padding: [80, 80] });
</script>
</body>
</html>
